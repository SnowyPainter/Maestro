global:
  scrape_interval: 15s
  scrape_timeout: 10s

scrape_configs:
  - job_name: "maestro-sidecar"
    metrics_path: /metrics
    static_configs:
      - targets:
          - "172.17.0.1:9600"

  - job_name: "maestro-backend"
    metrics_path: /metrics
    static_configs:
      - targets:
          - "172.17.0.1:8000"
