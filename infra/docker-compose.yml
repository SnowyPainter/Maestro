version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: maestro-postgres
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=maestro
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d maestro"]
      interval: 5s
      timeout: 3s
      retries: 30

  tei-e5-multibase:
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-1.8
    container_name: maestro-tei-e5-multibase
    command: ["--model-id", "intfloat/multilingual-e5-base", "--port", "8080"]
    ports: ["8080:8080"]
    volumes:
      - hf-cache:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/health || exit 1"]
    restart: unless-stopped

  minio:
    image: minio/minio:RELEASE.2024-04-18T19-09-19Z
    container_name: maestro-minio
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 6
    restart: unless-stopped

volumes:
  pgdata:
  hf-cache:
  minio-data:
