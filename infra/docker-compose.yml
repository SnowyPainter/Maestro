version: "3.9"

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: maestro-postgres
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=maestro
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d maestro"]
      interval: 5s
      timeout: 3s
      retries: 30

  tei-e5-multibase:
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-1.8
    container_name: maestro-tei-e5-multibase
    command: ["--model-id", "intfloat/multilingual-e5-base", "--port", "8080"]
    ports: ["8080:8080"]
    volumes:
      - hf-cache:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/health || exit 1"]
    restart: unless-stopped

  seaweed-master:
    image: chrislusf/seaweedfs:3.59
    command: master -ip=seaweed-master -ip.bind=0.0.0.0 -volumeSizeLimitMB=1024
    ports:
      - "9333:9333"
    volumes:
      - seaweed-master-data:/data

  seaweed-volume:
    image: chrislusf/seaweedfs:3.59
    command: volume -mserver=seaweed-master:9333 -ip=seaweed-volume -ip.bind=0.0.0.0
    depends_on:
      - seaweed-master
    volumes:
      - seaweed-volume-data:/data

  seaweed-filer:
    image: chrislusf/seaweedfs:3.59
    command: filer -master=seaweed-master:9333 -ip=seaweed-filer -ip.bind=0.0.0.0
    ports:
      - "8888:8888"
    depends_on:
      - seaweed-master
      - seaweed-volume
    volumes:
      - seaweed-filer-data:/data

  seaweed-s3:
    image: chrislusf/seaweedfs:3.59
    command: s3 -filer=seaweed-filer:8888 -ip=seaweed-s3 -ip.bind=0.0.0.0
    ports:
      - "8333:8333"
    depends_on:
      - seaweed-filer

volumes:
  pgdata:
  hf-cache:
  seaweed-master-data:
  seaweed-volume-data:
  seaweed-filer-config:
  seaweed-filer-data:
