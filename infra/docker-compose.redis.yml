version: "3.9"

services:
  redis:
    image: redis:7-alpine
    container_name: maestro-redis
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks:
      - redis_net
networks:
  redis_net:
    name: maestro_redis_net