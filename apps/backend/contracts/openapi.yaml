  /api/orchestrator/chat/query:
    post:
      tags:
      - chat
      summary: Chat Query
      operationId: chat_query_api_orchestrator_chat_query_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChatQuery'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ChatResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/orchestrator/chat/flows:
    get:
      tags:
      - chat
      summary: Get Available Flows
      description: Get list of all available flows.
      operationId: get_available_flows_api_orchestrator_chat_flows_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/FlowInfo'
                type: array
                title: Response Get Available Flows Api Orchestrator Chat Flows Get
  /api/health:
    get:
      summary: Health
      operationId: health_api_health_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
components:
  schemas:
    Aggregation:
      type: string
      enum:
      - sum
      - last
      - avg
      title: Aggregation
    BlockImage:
      properties:
        type:
          type: string
          const: image
          title: Type
        props:
          additionalProperties: true
          type: object
          title: Props
      type: object
      required:
      - type
      - props
      title: BlockImage
    BlockText:
      properties:
        type:
          type: string
          const: text
          title: Type
        props:
          additionalProperties: true
          type: object
          title: Props
      type: object
      required:
      - type
      - props
      title: BlockText
    BlockVideo:
      properties:
        type:
          type: string
          const: video
          title: Type
        props:
          additionalProperties: true
          type: object
          title: Props
      type: object
      required:
      - type
      - props
      title: BlockVideo
    CampaignAggregationCommand:
      properties:
        campaign_id:
          anyOf:
          - type: integer
          - type: 'null'
          title: Campaign Id
        as_of:
          title: As Of
          format: date-time
          type: string
          nullable: true
      type: object
      title: CampaignAggregationCommand
    CampaignCreate:
      properties:
        name:
          type: string
          maxLength: 120
          title: Name
        description:
          title: Description
          maxLength: 500
          type: string
          nullable: true
        start_at:
          title: Start At
          format: date-time
          type: string
          nullable: true
        end_at:
          title: End At
          format: date-time
          type: string
          nullable: true
      type: object
      required:
      - name
      title: CampaignCreate
    CampaignDeleteCommand:
      properties:
        campaign_id:
          anyOf:
          - type: integer
          - type: 'null'
          title: Campaign Id
      type: object
      title: CampaignDeleteCommand
    CampaignKPIDefListOut:
      properties:
        defs:
          items:
            $ref: '#/components/schemas/CampaignKPIDefOut'
          type: array
          title: Defs
      type: object
      required:
      - defs
      title: CampaignKPIDefListOut
    CampaignKPIDefOut:
      properties:
        id:
          type: integer
          title: Id
        campaign_id:
          type: integer
          title: Campaign Id
        key:
          $ref: '#/components/schemas/KPIKey'
        aggregation:
          $ref: '#/components/schemas/Aggregation'
        target_value:
          anyOf:
          - type: number
          - type: 'null'
          title: Target Value
        weight:
          type: number
          title: Weight
          default: 1.0
      type: object
      required:
      - id
      - campaign_id
      - key
      - aggregation
      title: CampaignKPIDefOut
    CampaignKPIDefUpsert:
      properties:
        key:
          $ref: '#/components/schemas/KPIKey'
        aggregation:
          $ref: '#/components/schemas/Aggregation'
          default: sum
        target_value:
          anyOf:
          - type: number
          - type: 'null'
          title: Target Value
        weight:
          type: number
          title: Weight
          default: 1.0
      type: object
      required:
      - key
      title: CampaignKPIDefUpsert
    CampaignKPIDefUpsertCommand:
      properties:
        campaign_id:
          anyOf:
          - type: integer
          - type: 'null'
          title: Campaign Id
        defs:
          items:
            $ref: '#/components/schemas/CampaignKPIDefUpsert'
          type: array
          title: Defs
      type: object
      required:
      - defs
      title: CampaignKPIDefUpsertCommand
    CampaignKPIRecordCommand:
      properties:
        campaign_id:
          anyOf:
          - type: integer
          - type: 'null'
          title: Campaign Id
        as_of:
          type: string
          format: date-time
          title: As Of
        values:
          additionalProperties:
            type: number
          type: object
          title: Values
      type: object
      required:
      - as_of
      - values
      title: CampaignKPIRecordCommand
    CampaignKPIResultOut:
      properties:
        id:
          type: integer
          title: Id
        campaign_id:
          type: integer
          title: Campaign Id
        as_of:
          type: string
          format: date-time
          title: As Of
        values:
          additionalProperties:
            type: number
          type: object
          title: Values
      type: object
      required:
      - id
      - campaign_id
      - as_of
      - values
      title: CampaignKPIResultOut
    CampaignOut:
      properties:
        name:
          type: string
          maxLength: 120
          title: Name
        description:
          title: Description
          maxLength: 500
          type: string
          nullable: true
        start_at:
          title: Start At
          format: date-time
          type: string
          nullable: true
        end_at:
          title: End At
          format: date-time
          type: string
          nullable: true
        id:
          type: integer
          title: Id
        owner_user_id:
          type: integer
          title: Owner User Id
        created_at:
          type: string
          format: date-time
          title: Created At
      type: object
      required:
      - name
      - id
      - owner_user_id
      - created_at
      title: CampaignOut
    CampaignUpdateCommand:
      properties:
        name:
          title: Name
          maxLength: 120
          type: string
          nullable: true
        description:
          title: Description
          maxLength: 500
          type: string
          nullable: true
        start_at:
          title: Start At
          format: date-time
          type: string
          nullable: true
        end_at:
          title: End At
          format: date-time
          type: string
          nullable: true
        campaign_id:
          anyOf:
          - type: integer
          - type: 'null'
          title: Campaign Id
      type: object
      title: CampaignUpdateCommand
    ChatCard:
      properties:
        card_type:
          type: string
          title: Card Type
        data:
          additionalProperties: true
          type: object
          title: Data
        title:
          title: Title
          type: string
          nullable: true
        source_flow:
          title: Source Flow
          type: string
          nullable: true
      type: object
      required:
      - card_type
      - data
      title: ChatCard
    ChatQuery:
      properties:
        message:
          type: string
          title: Message
          description: User utterance (English)
        session_id:
          title: Session Id
          description: Conversation identifier
          type: string
          nullable: true
      type: object
      required:
      - message
      title: ChatQuery
    ChatResponse:
      properties:
        intent:
          $ref: '#/components/schemas/IntentResult'
        plan_notes:
          title: Plan Notes
          type: string
          nullable: true
        cards:
          items:
            $ref: '#/components/schemas/ChatCard'
          type: array
          title: Cards
        messages:
          items:
            type: string
          type: array
          title: Messages
      type: object
      required:
      - intent
      title: ChatResponse
    DraftIR:
      properties:
        blocks:
          items:
            anyOf:
            - $ref: '#/components/schemas/BlockText'
            - $ref: '#/components/schemas/BlockImage'
            - $ref: '#/components/schemas/BlockVideo'
          type: array
          minItems: 1
          title: Blocks
        options:
          additionalProperties: true
          type: object
          title: Options
      type: object
      required:
      - blocks
      title: DraftIR
    DraftOut:
      properties:
        id:
          type: integer
          title: Id
        user_id:
          type: integer
          title: User Id
        campaign_id:
          anyOf:
          - type: integer
          - type: 'null'
          title: Campaign Id
        title:
          title: Title
          type: string
          nullable: true
        tags:
          anyOf:
          - items:
              type: string
            type: array
          - type: 'null'
          title: Tags
        goal:
          title: Goal
          type: string
          nullable: true
        ir:
          additionalProperties: true
          type: object
          title: Ir
        schema_version:
          type: integer
          title: Schema Version
        ir_revision:
          type: integer
          title: Ir Revision
        state:
          type: string
          title: State
        monitoring_started_at:
          title: Monitoring Started At
          format: date-time
          type: string
          nullable: true
