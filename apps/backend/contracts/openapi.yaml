      tags:
      - accounts
      - accounts
      summary: Create Platform Account
      operationId: accounts_platform_create_api_orchestrator_accounts_platform_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PlatformAccountCreateCommand'
