          application/json:
            schema:
              $ref: '#/components/schemas/PlatformAccountUpdateCommand'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PlatformAccountOut'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    delete:
      tags:
      - accounts
      - accounts
      summary: Delete Platform Account
      operationId: accounts_platform_delete_api_orchestrator_accounts_platform__account_id__delete
      parameters:
      - name: account_id
        in: path
        required: true
        schema:
          anyOf:
          - type: integer
          - type: 'null'
          title: Account Id
      requestBody:
        content:
          application/json:
            schema:
              anyOf:
              - $ref: '#/components/schemas/PlatformAccountDeleteCommand'
              - type: 'null'
              title: Payload
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageOut'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/orchestrator/accounts/personas:
    post:
      tags:
      - accounts
      - accounts
      summary: Create Persona
      operationId: accounts_persona_create_api_orchestrator_accounts_personas_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PersonaCreateCommand'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PersonaOut'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/orchestrator/accounts/personas/{persona_id}:
    put:
      tags:
      - accounts
      - accounts
      summary: Update Persona
      operationId: accounts_persona_update_api_orchestrator_accounts_personas__persona_id__put
      parameters:
      - name: persona_id
        in: path
        required: true
        schema:
          anyOf:
          - type: integer
          - type: 'null'
          title: Persona Id
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PersonaUpdateCommand'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PersonaOut'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    delete:
      tags:
      - accounts
      - accounts
      summary: Delete Persona
      operationId: accounts_persona_delete_api_orchestrator_accounts_personas__persona_id__delete
      parameters:
      - name: persona_id
        in: path
        required: true
        schema:
          anyOf:
          - type: integer
          - type: 'null'
          title: Persona Id
      requestBody:
        content:
          application/json:
            schema:
              anyOf:
              - $ref: '#/components/schemas/PersonaDeleteCommand'
              - type: 'null'
              title: Payload
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageOut'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/orchestrator/accounts/persona-account-links:
    post:
      tags:
      - accounts
      - accounts
      summary: Link Persona Account
      operationId: accounts_link_create_api_orchestrator_accounts_persona_account_links_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PersonaAccountLinkCommand'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PersonaAccountOut'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/orchestrator/accounts/persona-account-links/{persona_id}/{account_id}:
    delete:
      tags:
      - accounts
      - accounts
      summary: Unlink Persona Account
      operationId: accounts_link_delete_api_orchestrator_accounts_persona_account_links__persona_id___account_id__delete
      parameters:
      - name: persona_id
        in: path
        required: true
        schema:
          anyOf:
          - type: integer
          - type: 'null'
          title: Persona Id
      - name: account_id
        in: path
        required: true
        schema:
          anyOf:
          - type: integer
          - type: 'null'
          title: Account Id
      requestBody:
        content:
          application/json:
            schema:
              anyOf:
              - $ref: '#/components/schemas/PersonaAccountUnlinkCommand'
              - type: 'null'
              title: Payload
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MessageOut'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/orchestrator/insights:
    post:
      tags:
      - insights
      - insights
      summary: Ingest Insight
      operationId: insights_ingest_api_orchestrator_insights_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/InsightInCommand'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/InsightOut'
        '422':
          description: Validation Error
