openapi: 3.1.0
info:
  title: Maestro Backend
  version: 0.1.0
paths:
  /api/bff/trends:
    get:
      tags:
      - trends
      summary: List Trends
      operationId: list_trends_api_bff_trends_get
      parameters:
      - name: country
        in: query
        required: false
        schema:
          type: string
          default: US
          title: Country
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          maximum: 100
          minimum: 1
          default: 20
          title: Limit
      - name: q
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: 검색 질의(벡터검색)
          title: Q
        description: 검색 질의(벡터검색)
      - name: on_date
        in: query
        required: false
        schema:
          anyOf:
          - type: string
            format: date
          - type: 'null'
          description: YYYY-MM-DD (단일 일자)
          title: On Date
        description: YYYY-MM-DD (단일 일자)
      - name: since
        in: query
        required: false
        schema:
          anyOf:
          - type: string
            format: date
          - type: 'null'
          description: YYYY-MM-DD (이후/포함)
          title: Since
        description: YYYY-MM-DD (이후/포함)
      - name: until
        in: query
        required: false
        schema:
          anyOf:
          - type: string
            format: date
          - type: 'null'
          description: YYYY-MM-DD (이전/포함)
          title: Until
        description: YYYY-MM-DD (이전/포함)
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrendsListResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/bff/me:
    get:
      tags:
      - me
      summary: Me
      operationId: me_api_bff_me_get
