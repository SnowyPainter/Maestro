openapi: 3.1.0
info:
  title: Maestro Backend
  version: 0.1.0
paths:
  /api/trends:
    get:
      tags:
      - trends
      summary: List Trends
      operationId: list_trends_api_trends_get
      parameters:
      - name: country
        in: query
        required: false
        schema:
          type: string
          default: US
          title: Country
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          maximum: 100
          minimum: 1
          default: 20
          title: Limit
      - name: q
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: 검색 질의(벡터검색)
          title: Q
        description: 검색 질의(벡터검색)
      - name: on_date
        in: query
        required: false
        schema:
          anyOf:
          - type: string
            format: date
          - type: 'null'
          description: YYYY-MM-DD (단일 일자)
          title: On Date
        description: YYYY-MM-DD (단일 일자)
      - name: since
        in: query
        required: false
        schema:
          anyOf:
          - type: string
            format: date
          - type: 'null'
          description: YYYY-MM-DD (이후/포함)
          title: Since
        description: YYYY-MM-DD (이후/포함)
      - name: until
        in: query
        required: false
        schema:
          anyOf:
          - type: string
            format: date
          - type: 'null'
          description: YYYY-MM-DD (이전/포함)
          title: Until
        description: YYYY-MM-DD (이전/포함)
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TrendsListResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/auth/signup:
    post:
      tags:
      - auth
      summary: Signup
      operationId: signup_api_auth_signup_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SignupRequest'
        required: true
      responses:
        '201':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/auth/login:
    post:
      tags:
      - auth
      summary: Login
      operationId: login_api_auth_login_post
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
        required: true
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/me:
    get:
      tags:
      - me
      summary: Me
      operationId: me_api_me_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserResponse'
  /api/health:
    get:
      summary: Health
      operationId: health_api_health_get
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
components:
  schemas:
    HTTPValidationError:
      properties:
        detail:
          items:
            $ref: '#/components/schemas/ValidationError'
          type: array
          title: Detail
      type: object
      title: HTTPValidationError
    LoginRequest:
      properties:
        email:
          type: string
          format: email
          title: Email
        password:
          type: string
          title: Password
      type: object
      required:
      - email
      - password
      title: LoginRequest
    NewsItem:
      properties:
        news_item_title:
          anyOf:
          - type: string
          - type: 'null'
          title: News Item Title
        news_item_url:
          anyOf:
          - type: string
          - type: 'null'
          title: News Item Url
        news_item_picture:
          anyOf:
          - type: string
          - type: 'null'
          title: News Item Picture
        news_item_source:
          anyOf:
          - type: string
          - type: 'null'
          title: News Item Source
      type: object
      title: NewsItem
      description: 개별 뉴스 아이템 스키마
    SignupRequest:
      properties:
        email:
          type: string
          format: email
          title: Email
        password:
          type: string
          maxLength: 128
          minLength: 8
          title: Password
        display_name:
          anyOf:
          - type: string
          - type: 'null'
          title: Display Name
      type: object
      required:
      - email
      - password
      title: SignupRequest
    TokenResponse:
      properties:
        access_token:
          type: string
          title: Access Token
        token_type:
          type: string
          title: Token Type
          default: bearer
        user:
          $ref: '#/components/schemas/UserResponse'
      type: object
      required:
      - access_token
      - user
      title: TokenResponse
    TrendItem:
      properties:
        rank:
          type: integer
          title: Rank
          description: 트렌드 순위
        retrieved:
          anyOf:
          - type: string
          - type: string
            format: date-time
          title: Retrieved
          description: 데이터 수집 시각 (ISO format)
        title:
          type: string
          title: Title
          description: 트렌드 키워드
        approx_traffic:
          anyOf:
          - type: string
          - type: 'null'
          title: Approx Traffic
          description: '대략적인 트래픽 (예: ''200+'', ''1000+'')'
        link:
          anyOf:
          - type: string
          - type: 'null'
          title: Link
          description: Google Trends 링크
        pubDate:
          anyOf:
          - type: string
          - type: 'null'
          title: Pubdate
          description: 발행 날짜
        picture:
          anyOf:
          - type: string
          - type: 'null'
          title: Picture
          description: 대표 이미지 URL
        picture_source:
          anyOf:
          - type: string
          - type: 'null'
          title: Picture Source
          description: 이미지 출처
        news_item:
          anyOf:
          - type: string
          - type: 'null'
          title: News Item
          description: 뉴스 아이템 (보통 빈 문자열)
        news_items:
          anyOf:
          - items:
              $ref: '#/components/schemas/NewsItem'
            type: array
          - type: 'null'
          title: News Items
          description: 관련 뉴스 아이템 목록
      additionalProperties: true
      type: object
      required:
      - rank
      - retrieved
      - title
      title: TrendItem
      description: Google Trends 개별 트렌드 아이템 스키마
    TrendsListResponse:
      properties:
        country:
          type: string
          title: Country
          description: '국가 코드 (예: KR, US)'
        source:
          type: string
          enum:
          - cache
          - db
          - vector
          title: Source
          description: '데이터 소스 (예: cache, db, vector)'
        query:
          anyOf:
          - type: string
          - type: 'null'
          title: Query
          description: 키워드 (있으면 벡터 유사검색)
        items:
          items:
            $ref: '#/components/schemas/TrendItem'
          type: array
          title: Items
          description: 트렌드 아이템 목록
      type: object
      required:
      - country
      - source
      - items
      title: TrendsListResponse
    UserResponse:
      properties:
        id:
          type: integer
          title: Id
        email:
          type: string
          format: email
          title: Email
        display_name:
          anyOf:
          - type: string
          - type: 'null'
          title: Display Name
      type: object
      required:
      - id
      - email
      title: UserResponse
    ValidationError:
      properties:
        loc:
          items:
            anyOf:
            - type: string
            - type: integer
          type: array
          title: Location
        msg:
          type: string
          title: Message
        type:
          type: string
          title: Error Type
      type: object
      required:
      - loc
      - msg
      - type
      title: ValidationError
  securitySchemes:
    HTTPBearer:
      type: http
      scheme: bearer
security:
- HTTPBearer: []
servers:
- url: /api
