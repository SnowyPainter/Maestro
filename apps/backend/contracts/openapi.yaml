        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /api/orchestrator/campaigns/{campaign_id}/kpi-results:
    post:
      tags:
      - campaigns
      - campaigns
      summary: Record KPI Result
      operationId: campaigns_record_kpi_result_api_orchestrator_campaigns__campaign_id__kpi_results_post
